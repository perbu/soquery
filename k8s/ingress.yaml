apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: soquery
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - soquery.example.com  # Replace with your domain
      secretName: soquery-tls
  rules:
    - host: soquery.example.com  # Replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: soquery
                port:
                  name: http
