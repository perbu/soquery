apiVersion: apps/v1
kind: Deployment
metadata:
  name: soquery
  labels:
    app: soquery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: soquery
  template:
    metadata:
      labels:
        app: soquery
    spec:
      containers:
        - name: soquery
          image: soquery:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: EXTERNAL_URL
              valueFrom:
                secretKeyRef:
                  name: soquery-config
                  key: external-url
            - name: SF_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: soquery-config
                  key: sf-domain
            - name: SF_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: soquery-secrets
                  key: sf-client-id
            - name: SF_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: soquery-secrets
                  key: sf-client-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: soquery-secrets
                  key: database-url
            - name: TOKEN_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: soquery-secrets
                  key: token-encryption-key
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: soquery-secrets
                  key: jwt-signing-key
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
